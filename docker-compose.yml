services:
  pebs:
    build: .
    image: pebs-worktime:latest
    container_name: pebs
    restart: unless-stopped
    ports:
      # 服务器已有其他项目时避免端口冲突：用 PEBS_PORT 指定空闲端口，默认 8080
      - "${PEBS_PORT:-8080}:8000"
    volumes:
      - ./data:/app/data   # 数据库 + 上传视频持久化，升级镜像不丢数据
    environment:
      # 首次启动的管理员初始密码（仅在数据库无用户时生效），部署后请立即修改
      - PEBS_ADMIN_PASSWORD=${PEBS_ADMIN_PASSWORD:-admin123}
